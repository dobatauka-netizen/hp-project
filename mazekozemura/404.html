<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ページが見つかりません｜まぜこぜむら</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Zen+Maru+Gothic:wght@400;500;700&display=swap" rel="stylesheet">
  <style>
    body { margin:0; background:#FFF7ED; font-family:'Zen Maru Gothic',sans-serif; display:flex; align-items:center; justify-content:center; min-height:100vh; }
    .wrap { text-align:center; padding:40px 24px; max-width:480px; }
    .num { font-size:96px; font-weight:700; color:#D96B22; line-height:1; margin-bottom:8px; }
    h1 { font-size:22px; font-weight:700; color:#1E293B; margin-bottom:12px; }
    p { font-size:15px; color:#64748B; line-height:1.8; margin-bottom:32px; }
    .btn { display:inline-block; background:#D96B22; color:#fff; font-weight:700; font-size:16px; padding:14px 36px; border-radius:32px; text-decoration:none; }
    .btn:hover { background:#C2410C; }
    .emoji { font-size:64px; margin-bottom:16px; }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="emoji">🍙</div>
    <div class="num">404</div>
    <h1>ページが見つかりません</h1>
    <p>お探しのページは移動・削除されたか、<br>URLが間違っている可能性があります。</p>
    <a href="/" class="btn">トップページへ戻る</a>
  </div>
</body>
</html>
