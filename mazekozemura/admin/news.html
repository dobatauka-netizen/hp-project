<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>お知らせ管理｜まぜこぜむら 管理画面</title>
  <link rel="stylesheet" href="css/admin.css">
</head>
<body>
<div class="admin-layout">

  <!-- サイドバー -->
  <aside class="sidebar">
    <div class="sidebar-logo">
      <img src="../images/logo.png" alt="まぜこぜむら">
      <div>
        <div class="sidebar-logo-text">まぜこぜむら</div>
        <div class="sidebar-logo-sub">管理画面</div>
      </div>
    </div>
    <nav class="sidebar-nav">
      <div class="nav-section">メイン</div>
      <a href="dashboard.html" class="nav-link">
        <span class="nav-icon">🏠</span> ダッシュボード
      </a>
      <div class="nav-section">コンテンツ管理</div>
      <a href="news.html" class="nav-link active">
        <span class="nav-icon">📰</span> お知らせ管理
      </a>
      <a href="events.html" class="nav-link">
        <span class="nav-icon">📅</span> イベント管理
      </a>
      <div class="nav-section">設定</div>
      <a href="admins.html" class="nav-link">
        <span class="nav-icon">👥</span> 管理者管理
      </a>
      <a href="../index.html" class="nav-link" target="_blank">
        <span class="nav-icon">🌐</span> 公開サイトを見る
        <span class="nav-external">↗</span>
      </a>
    </nav>
    <div class="sidebar-footer">
      <div class="sidebar-user-email" id="admin-user-email"></div>
      <button class="btn-logout" id="logout-btn">ログアウト</button>
    </div>
  </aside>

  <!-- メインエリア -->
  <main class="admin-main">
    <div class="topbar">
      <span class="topbar-title">お知らせ管理</span>
      <button class="btn btn-primary" id="btn-new">＋ 新規作成</button>
    </div>
    <div class="admin-content">

      <!-- フィルターバー -->
      <div class="admin-card" style="margin-bottom:20px;">
        <div class="admin-card-body" style="padding:16px 20px;">
          <div style="display:flex;gap:12px;flex-wrap:wrap;align-items:center;">
            <input type="text" id="search-input" placeholder="タイトルで検索…"
              style="padding:8px 14px;border:2px solid #E2E8F0;border-radius:8px;font-size:14px;min-width:200px;">
            <select id="filter-cat" style="padding:8px 32px 8px 12px;border:2px solid #E2E8F0;border-radius:8px;font-size:14px;appearance:none;">
              <option value="">すべてのカテゴリ</option>
              <option value="event">イベント</option>
              <option value="report">レポート</option>
              <option value="info">お知らせ</option>
            </select>
            <select id="filter-status" style="padding:8px 32px 8px 12px;border:2px solid #E2E8F0;border-radius:8px;font-size:14px;appearance:none;">
              <option value="">すべての状態</option>
              <option value="pub">公開中</option>
              <option value="draft">下書き</option>
            </select>
            <span style="font-size:13px;color:#64748B;margin-left:auto;">
              <strong id="news-count">0</strong> 件
            </span>
          </div>
        </div>
      </div>

      <!-- テーブル -->
      <div class="admin-card">
        <table class="admin-table">
          <thead>
            <tr>
              <th style="width:110px">日付</th>
              <th style="width:100px">カテゴリ</th>
              <th>タイトル</th>
              <th style="width:90px">状態</th>
              <th style="width:120px">操作</th>
            </tr>
          </thead>
          <tbody id="news-tbody">
            <tr class="loading-row"><td colspan="5">読み込み中…</td></tr>
          </tbody>
        </table>
      </div>

    </div>
  </main>
</div>

<!-- 記事編集モーダル -->
<div class="modal-overlay hidden" id="modal-overlay">
  <div class="modal">
    <div class="modal-header">
      <h3 id="modal-title">記事を作成</h3>
      <button class="modal-close" id="modal-close" aria-label="閉じる">×</button>
    </div>
    <form id="news-form">
      <div class="form-grid2">
        <div class="form-group full">
          <label>タイトル <span style="color:#EF4444">*</span></label>
          <input type="text" id="f-title" placeholder="記事タイトルを入力" required>
        </div>
        <div class="form-group">
          <label>カテゴリ <span style="color:#EF4444">*</span></label>
          <select id="f-category" required>
            <option value="event">イベント</option>
            <option value="report">レポート</option>
            <option value="info">お知らせ</option>
          </select>
        </div>
        <div class="form-group">
          <label>日付 <span style="color:#EF4444">*</span></label>
          <input type="date" id="f-date" required>
        </div>
        <div class="form-group full">
          <label>本文（任意）</label>
          <textarea id="f-body" placeholder="記事の本文や詳細を入力（省略可）"></textarea>
        </div>
        <div class="form-group full">
          <label style="display:flex;align-items:center;gap:8px;cursor:pointer;font-weight:700;color:#1E293B;">
            <input type="checkbox" id="f-published" style="width:18px;height:18px;accent-color:#D96B22;">
            公開する（チェックを外すと下書き保存）
          </label>
        </div>
      </div>
      <div class="modal-footer">
        <button type="button" class="btn btn-ghost" id="btn-cancel">キャンセル</button>
        <button type="submit" class="btn btn-primary" id="btn-save">保存する</button>
      </div>
    </form>
  </div>
</div>

<!-- 確認ダイアログ -->
<div class="confirm-overlay hidden" id="confirm-overlay">
  <div class="confirm-box">
    <div class="confirm-icon">🗑️</div>
    <h4 id="confirm-title">削除しますか？</h4>
    <p id="confirm-msg">この操作は元に戻せません。</p>
    <div class="confirm-btns">
      <button class="btn btn-ghost" id="confirm-cancel">キャンセル</button>
      <button class="btn btn-danger" id="confirm-ok">削除する</button>
    </div>
  </div>
</div>

<!-- トースト -->
<div id="toast-container"></div>

<script type="module" src="js/news.js"></script>
</body>
</html>
