<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>テキスト編集｜まぜこぜむら 管理画面</title>
  <link rel="stylesheet" href="css/admin.css">
  <style>
    .content-card {
      border: 1px solid var(--border);
      border-radius: 12px;
      background: var(--white);
      box-shadow: var(--shadow);
      padding: 20px 24px;
      margin-bottom: 16px;
    }
    .content-label {
      font-size: 13px;
      font-weight: 700;
      color: var(--text);
      margin-bottom: 8px;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .content-label .updated-at {
      font-size: 11px;
      color: #94A3B8;
      font-weight: 400;
    }
    .content-textarea {
      width: 100%;
      padding: 10px 12px;
      border: 1px solid #CBD5E1;
      border-radius: 8px;
      font-size: 14px;
      font-family: inherit;
      line-height: 1.7;
      resize: vertical;
      min-height: 72px;
      color: var(--text);
      background: #F8FAFC;
      transition: border-color 0.2s;
    }
    .content-textarea:focus {
      outline: none;
      border-color: var(--accent);
      background: #fff;
    }
    .content-actions {
      display: flex;
      gap: 8px;
      margin-top: 10px;
      align-items: center;
    }
    .content-status {
      font-size: 12px;
      color: #64748B;
    }
  </style>
</head>
<body>
<div class="admin-layout">

  <!-- サイドバー -->
  <aside class="sidebar">
    <div class="sidebar-logo">
      <img src="../images/logo.png" alt="まぜこぜむら">
      <div>
        <div class="sidebar-logo-text">まぜこぜむら</div>
        <div class="sidebar-logo-sub">管理画面</div>
      </div>
    </div>
    <nav class="sidebar-nav">
      <div class="nav-section">メイン</div>
      <a href="dashboard.html" class="nav-link">
        <span class="nav-icon">🏠</span> ダッシュボード
      </a>
      <div class="nav-section">コンテンツ管理</div>
      <a href="news.html" class="nav-link">
        <span class="nav-icon">📰</span> お知らせ管理
      </a>
      <a href="pages.html" class="nav-link">
        <span class="nav-icon">🖼️</span> ページ画像管理
      </a>
      <a href="content.html" class="nav-link active">
        <span class="nav-icon">✏️</span> テキスト編集
      </a>
      <div class="nav-section">設定</div>
      <a href="admins.html" class="nav-link">
        <span class="nav-icon">👥</span> 管理者管理
      </a>
      <a href="../index.html" class="nav-link" target="_blank">
        <span class="nav-icon">🌐</span> 公開サイトを見る
        <span class="nav-external">↗</span>
      </a>
    </nav>
    <div class="sidebar-footer">
      <div class="sidebar-user-email" id="admin-user-email"></div>
      <button class="btn-logout" id="logout-btn">ログアウト</button>
    </div>
  </aside>

  <!-- メインエリア -->
  <main class="admin-main">
    <div class="topbar">
      <span class="topbar-title">テキスト編集</span>
      <span style="font-size:13px;color:#64748B;">保存するとサイトに即時反映されます</span>
    </div>
    <div class="admin-content">
      <div id="content-container">
        <p style="color:#64748B;">読み込み中…</p>
      </div>
    </div>
  </main>
</div>

<div id="toast-container"></div>
<script type="module" src="js/content.js"></script>
</body>
</html>
