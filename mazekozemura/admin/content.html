<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>テキスト編集｜まぜこぜむら 管理画面</title>
  <link rel="stylesheet" href="css/admin.css">
  <style>
    /* ── タブ ── */
    .tab-bar {
      display: flex;
      gap: 8px;
      margin-bottom: 28px;
      flex-wrap: wrap;
    }
    .tab-btn {
      padding: 10px 22px;
      border-radius: 24px;
      border: 2px solid #E2E8F0;
      background: #F8FAFC;
      font-size: 15px;
      font-weight: 700;
      cursor: pointer;
      color: #64748B;
      transition: all 0.2s;
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .tab-btn:hover { border-color: var(--accent); color: var(--accent); }
    .tab-btn.active { background: var(--accent); border-color: var(--accent); color: #fff; }
    .tab-count { font-size: 11px; opacity: 0.75; }

    /* ── カード全体 ── */
    .content-card {
      background: #fff;
      border: 2px solid #E2E8F0;
      border-radius: 16px;
      margin-bottom: 28px;
      overflow: hidden;
      transition: border-color 0.2s;
    }
    .content-card:focus-within { border-color: var(--accent); }

    /* ── 場所バッジ（オレンジ帯） ── */
    .location-badge {
      background: linear-gradient(90deg, var(--accent) 0%, #E8793A 100%);
      color: #fff;
      font-size: 12px;
      font-weight: 700;
      padding: 7px 18px;
      display: flex;
      align-items: center;
      gap: 6px;
      letter-spacing: 0.03em;
    }
    .location-icon { font-size: 13px; }

    /* ── カードヘッダー ── */
    .content-card-header {
      display: flex;
      align-items: flex-start;
      gap: 12px;
      padding: 18px 20px 12px;
    }
    .content-icon { font-size: 26px; flex-shrink: 0; }
    .content-meta { flex: 1; }
    .content-label { font-size: 17px; font-weight: 800; color: #1E293B; margin-bottom: 3px; }
    .content-hint  { font-size: 13px; color: #64748B; line-height: 1.6; }

    /* ── 保存状態バッジ ── */
    .not-saved-badge {
      font-size: 11px; font-weight: 700;
      background: #FEF3C7; color: #92400E;
      border: 1px solid #FCD34D;
      border-radius: 20px; padding: 3px 10px;
      white-space: nowrap; flex-shrink: 0;
    }
    .saved-badge {
      font-size: 11px; font-weight: 700;
      background: #D1FAE5; color: #065F46;
      border: 1px solid #6EE7B7;
      border-radius: 20px; padding: 3px 10px;
      white-space: nowrap; flex-shrink: 0;
    }

    /* ── プレビューセクション ── */
    .preview-section {
      margin: 0 20px 12px;
      border: 2px dashed #CBD5E1;
      border-radius: 10px;
      overflow: hidden;
    }
    .preview-label {
      background: #F1F5F9;
      font-size: 11px;
      font-weight: 700;
      color: #64748B;
      padding: 6px 14px;
      border-bottom: 1px solid #E2E8F0;
      letter-spacing: 0.03em;
    }
    .preview-box {
      padding: 14px 18px;
      min-height: 36px;
      background: #FAFAFA;
    }

    /* ── 編集セクション ── */
    .edit-section {
      margin: 0 20px 12px;
    }
    .edit-label {
      font-size: 12px;
      font-weight: 700;
      color: var(--accent);
      margin-bottom: 6px;
      display: flex;
      align-items: center;
      gap: 4px;
    }
    .content-textarea {
      width: 100%;
      padding: 12px 14px;
      border: 2px solid #CBD5E1;
      border-radius: 10px;
      font-size: 15px;
      font-family: inherit;
      line-height: 2;
      resize: none;
      overflow: hidden;
      min-height: 52px;
      color: #1E293B;
      background: #F8FAFC;
      transition: border-color 0.2s, background 0.2s;
      box-sizing: border-box;
    }
    .content-textarea:focus {
      outline: none;
      border-color: var(--accent);
      background: #fff;
    }

    /* ── フッター ── */
    .content-footer {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 12px 20px 18px;
      flex-wrap: wrap;
      gap: 8px;
      border-top: 1px solid #F1F5F9;
      background: #FAFAFA;
    }
    .updated-at { font-size: 12px; color: #94A3B8; }
    .content-status { font-size: 13px; color: #DC2626; }
    .save-btn {
      background: var(--accent);
      color: #fff;
      border: none;
      border-radius: 10px;
      padding: 11px 28px;
      font-size: 15px;
      font-weight: 700;
      cursor: pointer;
      transition: background 0.2s, transform 0.1s;
      font-family: inherit;
    }
    .save-btn:hover:not(:disabled) { background: #C2410C; transform: translateY(-1px); }
    .save-btn:disabled { opacity: 0.7; cursor: not-allowed; }

    /* ── 説明バナー ── */
    .info-banner {
      background: #FFF7ED;
      border: 2px solid #FED7AA;
      border-radius: 12px;
      padding: 14px 18px;
      margin-bottom: 24px;
      font-size: 14px;
      color: #9A3412;
      line-height: 1.7;
    }
  </style>
</head>
<body>
<div class="admin-layout">

  <!-- サイドバー -->
  <aside class="sidebar">
    <div class="sidebar-logo">
      <img src="../images/logo.png" alt="まぜこぜむら">
      <div>
        <div class="sidebar-logo-text">まぜこぜむら</div>
        <div class="sidebar-logo-sub">管理画面</div>
      </div>
    </div>
    <nav class="sidebar-nav">
      <div class="nav-section">メイン</div>
      <a href="dashboard.html" class="nav-link">
        <span class="nav-icon">🏠</span> ダッシュボード
      </a>
      <div class="nav-section">コンテンツ管理</div>
      <a href="news.html" class="nav-link">
        <span class="nav-icon">📰</span> お知らせ管理
      </a>
      <a href="pages.html" class="nav-link">
        <span class="nav-icon">🖼️</span> ページ画像管理
      </a>
      <a href="content.html" class="nav-link active">
        <span class="nav-icon">✏️</span> テキスト編集
      </a>
      <div class="nav-section">設定</div>
      <a href="admins.html" class="nav-link">
        <span class="nav-icon">👥</span> 管理者管理
      </a>
      <a href="../index.html" class="nav-link" target="_blank">
        <span class="nav-icon">🌐</span> 公開サイトを見る
        <span class="nav-external">↗</span>
      </a>
    </nav>
    <div class="sidebar-footer">
      <div class="sidebar-user-email" id="admin-user-email"></div>
      <button class="btn-logout" id="logout-btn">ログアウト</button>
    </div>
  </aside>

  <!-- メインエリア -->
  <main class="admin-main">
    <div class="topbar">
      <span class="topbar-title">✏️ テキスト編集</span>
    </div>
    <div class="admin-content">

      <div class="info-banner">
        💡 <strong>使い方：</strong>
        ページのタブをえらぶ → 編集したい項目のオレンジのバーで場所を確認 →
        「▼ サイト上での見た目」で今の表示を確認 →
        下のテキストボックスで書きかえ → 「💾 保存する」を押す
      </div>

      <div class="tab-bar" id="page-tabs"></div>

      <div id="content-container">
        <p style="color:#64748B;">読み込み中…</p>
      </div>

    </div>
  </main>
</div>

<div id="toast-container"></div>
<script type="module" src="js/content.js"></script>
</body>
</html>
