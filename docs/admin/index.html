<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ログイン｜まぜこぜむら 管理画面</title>
  <link rel="stylesheet" href="css/admin.css">
</head>
<body class="login-page">

<div class="login-wrap">
  <div class="login-logo">
    <img src="../images/logo.png" alt="まぜこぜむら">
    <h1>管理画面ログイン</h1>
    <p>一般社団法人まぜこぜむら</p>
  </div>

  <form id="login-form">
    <div class="form-group">
      <label for="email">メールアドレス</label>
      <input type="email" id="email" placeholder="admin@example.com" required autocomplete="email">
    </div>
    <div class="form-group">
      <label for="password">パスワード</label>
      <input type="password" id="password" placeholder="••••••••" required autocomplete="current-password">
    </div>
    <span id="login-error" class="error-msg"></span>
    <button type="submit" class="btn-login" id="login-btn">ログイン</button>
  </form>
</div>

<script type="module" src="js/login.js"></script>
</body>
</html>
